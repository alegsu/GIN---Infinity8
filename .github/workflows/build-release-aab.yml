name: Build Release AAB (Play Store)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (es. 1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android platform & build-tools
        run: |
          SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager 2>/dev/null | head -1)"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Create local.properties
        working-directory: MeteoRadar
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        working-directory: MeteoRadar
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/meteoradar-release.keystore

      - name: Build Release AAB
        working-directory: MeteoRadar
        env:
          KEYSTORE_PATH: /tmp/meteoradar-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: meteoradar
        run: |
          BUILD_NUM=${{ github.run_number }}
          ./gradlew bundleRelease -PbuildNumber=$BUILD_NUM --stacktrace

      - name: Rename AAB
        run: |
          mkdir -p /tmp/aab-out
          cp MeteoRadar/app/build/outputs/bundle/release/app-release.aab \
             /tmp/aab-out/MeteoRadar-release.aab

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeteoRadar-release-aab
          path: /tmp/aab-out/MeteoRadar-release.aab
          retention-days: 90

      - name: Create GitHub Release with AAB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "MeteoRadar v1.${{ github.run_number }} — Release"
          body: |
            ## MeteoRadar v1.${{ github.run_number }} — Play Store Release

            Questo AAB firmato è pronto per essere caricato sul Google Play Store.

            **Come caricare:**
            1. Vai su [Google Play Console](https://play.google.com/console)
            2. Seleziona l'app MeteoRadar
            3. Produzione → Crea nuova versione
            4. Carica `MeteoRadar-release.aab`
          files: /tmp/aab-out/MeteoRadar-release.aab
          prerelease: false
