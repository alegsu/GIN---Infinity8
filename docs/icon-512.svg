<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#112240"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" fill="url(#bg)" rx="112"/>

  <!-- Cloud shadow -->
  <ellipse cx="256" cy="268" rx="168" ry="40" fill="#000" opacity="0.18"/>

  <!-- Cloud body -->
  <g filter="url(#shadow)">
    <!-- Main cloud shape -->
    <path fill="url(#cloud)"
      d="M136,260
         C100,260 72,232 72,196
         C72,160 100,132 136,132
         C140,100 168,76 202,76
         C220,76 236,84 248,96
         C260,80 278,70 300,70
         C340,70 372,102 372,142
         C372,144 372,146 371,148
         C376,146 382,145 388,145
         C420,145 446,171 446,203
         C446,235 420,261 388,261 Z"/>
  </g>

  <!-- Lightning bolt -->
  <polygon
    fill="url(#bolt)"
    points="278,170 244,272 266,272 232,390 304,258 278,258 310,170"
    filter="url(#shadow)"/>

  <!-- Lightning bolt shine -->
  <polygon
    fill="#FFF9C4"
    opacity="0.6"
    points="284,178 255,265 272,265 248,360 298,263 277,263 304,178"/>

  <!-- Hailstones row 1 -->
  <circle cx="140" cy="308" r="24" fill="#ECEFF1" filter="url(#shadow)"/>
  <circle cx="196" cy="340" r="20" fill="#CFD8DC"/>
  <circle cx="114" cy="348" r="17" fill="#ECEFF1"/>

  <!-- Hailstones row 2 -->
  <circle cx="390" cy="310" r="22" fill="#ECEFF1" filter="url(#shadow)"/>
  <circle cx="424" cy="348" r="18" fill="#CFD8DC"/>
  <circle cx="362" cy="350" r="15" fill="#ECEFF1"/>

  <!-- Small accent hailstones -->
  <circle cx="158" cy="390" r="13" fill="#B0BEC5" opacity="0.7"/>
  <circle cx="400" cy="392" r="12" fill="#B0BEC5" opacity="0.7"/>

</svg>
